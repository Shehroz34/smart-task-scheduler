services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"

  backend:
    build:
      context: ./balance-backend
    restart: unless-stopped
    environment:
      PORT: 5050
      MONGO_URI: mongodb://mongo:27017/smart_scheduler
      JWT_SECRET: change-me-in-production
      JWT_EXPIRES_IN: 7d
      CLIENT_ORIGIN: http://localhost:5173
    depends_on:
      - mongo
    ports:
      - "5050:5050"

  frontend:
    build:
      context: ./smart-scheduler-frontend
      args:
        VITE_API_URL: http://localhost:5050/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:4173"

volumes:
  mongo-data:
